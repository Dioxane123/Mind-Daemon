<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Daemon 测试Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
        }
        .connected { background: #1e7e34; }
        .disconnected { background: #c82333; }
        .connecting { background: #e0a800; }
        .data-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .data-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }
        .data-card h3 {
            color: #4fc3f7;
            margin-top: 0;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 16px;
        }
        .score-value {
            font-weight: bold;
            color: #81c784;
        }
        .log {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 2px 0;
        }
        .timestamp {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Mind Daemon 测试Dashboard</h1>
        
        <div id="status" class="status connecting">正在连接到WebSocket服务器...</div>
        
        <div class="data-display">
            <div class="data-card">
                <h3>📊 实时认知分数</h3>
                <div class="score-item">
                    <span>注意力 (At):</span>
                    <span id="score-at" class="score-value">--</span>
                </div>
                <div class="score-item">
                    <span>兴奋度 (Ex):</span>
                    <span id="score-ex" class="score-value">--</span>
                </div>
                <div class="score-item">
                    <span>放松度 (Re):</span>
                    <span id="score-re" class="score-value">--</span>
                </div>
                <div class="score-item">
                    <span>压力值 (St):</span>
                    <span id="score-st" class="score-value">--</span>
                </div>
            </div>
            
            <div class="data-card">
                <h3>🎛️ 环境状态</h3>
                <div class="score-item">
                    <span>灯光:</span>
                    <span id="light-status" class="score-value">--</span>
                </div>
                <div class="score-item">
                    <span>音乐:</span>
                    <span id="music-status" class="score-value">--</span>
                </div>
                <div class="score-item">
                    <span>精神状态:</span>
                    <span id="mental-state" class="score-value">--</span>
                </div>
                <div class="score-item">
                    <span>当前动作:</span>
                    <span id="current-action" class="score-value">--</span>
                </div>
            </div>
        </div>
        
        <div class="data-card">
            <h3>📝 实时日志</h3>
            <div id="log" class="log">
                <div class="log-entry">
                    <span class="timestamp">[系统启动]</span> 等待WebSocket连接...
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;
        let dataCount = 0;
        
        function connect() {
            const status = document.getElementById('status');
            const log = document.getElementById('log');
            
            try {
                ws = new WebSocket('ws://localhost:8889');
                
                ws.onopen = function(event) {
                    status.className = 'status connected';
                    status.textContent = '✅ WebSocket连接成功';
                    addLog('WebSocket连接成功');
                    
                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };
                
                ws.onmessage = function(event) {
                    dataCount++;
                    try {
                        const data = JSON.parse(event.data);
                        addLog(`收到数据包 #${dataCount}: ${JSON.stringify(data).substring(0, 100)}...`);
                        updateDisplay(data);
                    } catch (error) {
                        addLog(`解析数据失败: ${error.message}`);
                    }
                };
                
                ws.onclose = function(event) {
                    status.className = 'status disconnected';
                    status.textContent = '❌ WebSocket连接断开，正在尝试重连...';
                    addLog('WebSocket连接断开，正在尝试重连...');
                    
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(connect, 3000);
                    }
                };
                
                ws.onerror = function(error) {
                    addLog(`WebSocket错误: ${error}`);
                };
                
            } catch (error) {
                status.className = 'status disconnected';
                status.textContent = '❌ 无法连接到WebSocket服务器';
                addLog(`连接失败: ${error.message}`);
                
                if (!reconnectInterval) {
                    reconnectInterval = setInterval(connect, 3000);
                }
            }
        }
        
        function addLog(message) {
            const log = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            
            // 限制日志条目数量
            while (log.children.length > 50) {
                log.removeChild(log.firstChild);
            }
        }
        
        function updateDisplay(data) {
            // 更新认知分数
            if (data.basic && data.basic.Scores) {
                document.getElementById('score-at').textContent = data.basic.Scores.At || '--';
                document.getElementById('score-ex').textContent = data.basic.Scores.Ex || '--';
                document.getElementById('score-re').textContent = data.basic.Scores.Re || '--';
                document.getElementById('score-st').textContent = data.basic.Scores.St || '--';
            }
            
            // 更新环境状态
            if (data.basic) {
                const lightStatus = data.basic.light?.is_on ? '开启' : '关闭';
                document.getElementById('light-status').textContent = lightStatus;
                
                const musicStatus = data.basic.music?.is_playing ? 
                    `播放: ${data.basic.music.name || '未知'}` : '停止';
                document.getElementById('music-status').textContent = musicStatus;
            }
            
            // 更新高级状态
            if (data.advanced) {
                document.getElementById('mental-state').textContent = data.advanced.State || '--';
                document.getElementById('current-action').textContent = data.advanced.Action || '--';
            }
        }
        
        // 启动连接
        connect();
    </script>
</body>
</html>
